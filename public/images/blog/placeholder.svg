<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#2D3E5F"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1000" cy="130" r="180" fill="rgba(201,168,76,0.06)"/>
  <circle cx="200" cy="500" r="220" fill="rgba(201,168,76,0.04)"/>
  <g transform="translate(600 280)" text-anchor="middle">
    <text font-family="'Noto Kufi Arabic', Arial, sans-serif" font-size="72" font-weight="900" fill="#C9A84C" letter-spacing="4">مكتب السعدي</text>
    <text y="70" font-family="'Noto Kufi Arabic', Arial, sans-serif" font-size="32" font-weight="600" fill="rgba(255,255,255,0.85)">للمحاماة والاستشارات القانونية</text>
    <line x1="-140" y1="110" x2="140" y2="110" stroke="#C9A84C" stroke-width="2"/>
    <text y="160" font-family="'Noto Kufi Arabic', Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.65)">alhusseinalsaadi.sa</text>
  </g>
</svg>
